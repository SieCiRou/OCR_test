services:
  ocr-app:
    image: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-devel
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: bash
    shm_size: '8gb'